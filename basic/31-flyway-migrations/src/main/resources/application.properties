spring.application.name=flyway-migrations

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/flywaydb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
# Very important: Hibernate must not alter the schema when using Flyway.
# It should only validate that the entity definitions match the schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway configuration
spring.flyway.enabled=true
# Flyway looks for SQL migrations in 'classpath:db/migration' by default.
