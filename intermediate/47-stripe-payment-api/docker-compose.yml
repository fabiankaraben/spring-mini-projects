services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL – relational database for storing local payment records
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stripepayment-db
    environment:
      # Database credentials – match the values in application.yml
      POSTGRES_DB: stripedb
      POSTGRES_USER: stripeuser
      POSTGRES_PASSWORD: stripepass
    ports:
      # Expose port 5432 for optional local inspection tools (e.g., DBeaver, psql)
      - "5432:5432"
    volumes:
      # Persist data across container restarts with a named volume
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready to wait until PostgreSQL is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U stripeuser -d stripedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Spring Boot application
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: stripepayment-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        # Wait until PostgreSQL is healthy before starting the app
        condition: service_healthy
    environment:
      # Override the datasource URL to use the 'db' service hostname (Docker internal DNS)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stripedb
      SPRING_DATASOURCE_USERNAME: stripeuser
      SPRING_DATASOURCE_PASSWORD: stripepass
      # Inject your Stripe test key here. In production use a secrets manager.
      # Get your test key from: https://dashboard.stripe.com/test/apikeys
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_placeholder}

volumes:
  # Named volume for PostgreSQL data persistence
  postgres_data:
