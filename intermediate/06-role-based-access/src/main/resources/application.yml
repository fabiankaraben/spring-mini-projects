spring:
  # ── DataSource ──────────────────────────────────────────────────────────────
  # Connection details for the PostgreSQL database.
  # When running via Docker Compose the SPRING_DATASOURCE_* env vars override
  # these values (the "db" hostname resolves inside the Docker network).
  datasource:
    url: jdbc:postgresql://localhost:5432/rolebasedaccessdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    # update: Hibernate will CREATE tables on first run and ALTER them on schema
    # changes. Use "validate" or "none" in production.
    hibernate:
      ddl-auto: update
    # Log generated SQL to understand what Hibernate is doing
    show-sql: true
    properties:
      hibernate:
        # Explicitly tell Hibernate which dialect to use for SQL generation
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Pretty-print the SQL logged to the console
        format_sql: true

# ── Application-specific settings ─────────────────────────────────────────────
app:
  jwt:
    # Secret key used to sign and verify JWT tokens with HMAC-SHA256.
    # IMPORTANT: This value is for local development ONLY.
    # In production, override this via an environment variable or secrets manager.
    # Generate a strong secret with: openssl rand -base64 48
    secret: "ThisIsAVeryLongSecretKeyForRoleBasedAccessMiniProjectDev2024!"
    # Token validity in seconds. 3600 = 1 hour.
    # Short-lived tokens reduce the window of opportunity if a token is compromised.
    expiration-seconds: 3600
