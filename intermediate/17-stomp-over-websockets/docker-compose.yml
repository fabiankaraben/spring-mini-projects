services:
  # ── Spring Boot STOMP over WebSockets application ─────────────────────────
  app:
    build: .
    container_name: stomp-over-websockets-app
    ports:
      # Map host port 8080 to container port 8080.
      # WebSocket upgrade requests (ws://) also use this HTTP port.
      - "8080:8080"
    environment:
      # Override the server port if needed (defaults to 8080 from application.yml)
      - SERVER_PORT=8080
