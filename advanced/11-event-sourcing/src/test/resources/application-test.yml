# ============================================================================
# application-test.yml — Test profile configuration
# ============================================================================
# This file is activated by @ActiveProfiles("test") in integration tests.
# The actual datasource URL/credentials are injected at runtime by
# @DynamicPropertySource from the Testcontainers PostgreSQL container,
# so the values here serve only as documentation / fallback.
# ============================================================================

spring:

  jpa:
    hibernate:
      ddl-auto: create-drop   # Drop and recreate all tables for each test run
    properties:
      hibernate:
        show_sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

axon:
  axonserver:
    enabled: false

logging:
  level:
    org.axonframework: WARN
    com.example.eventsourcing: INFO
