# Testcontainers configuration.
# These properties are read from the classpath by Testcontainers at startup.
#
# DOCKER_API_VERSION / docker.api.version – overrides docker-java's default
# API version (v1.24) which Docker Desktop 29+ rejects with HTTP 400.
# Setting this to 1.44 makes docker-java use an API version that Docker Desktop
# accepts, allowing Testcontainers strategy validation to succeed.
DOCKER_API_VERSION=1.44
docker.api.version=1.44
