# =============================================================================
# Application configuration for the RSocket Server mini-project.
#
# Two servers are started when this application launches:
#   1. Spring Boot HTTP server — port 8080 (Actuator health/info endpoints).
#   2. RSocket TCP server      — port 7000 (all four interaction model routes).
#
# The two ports are deliberately kept separate so that:
#   - The RSocket port can be firewalled for internal service-to-service traffic.
#   - The HTTP port can be exposed publicly for health checks and monitoring.
# =============================================================================

spring:

  application:
    # Application name shown in logs and Actuator /info.
    name: rsocket-server

  # ---------------------------------------------------------------------------
  # JPA / Hibernate configuration
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      # create-drop: schema is created on context startup and dropped on shutdown.
      # Suitable for demos and development. Use 'validate' or 'none' in production
      # with a migration tool (Flyway/Liquibase).
      ddl-auto: create-drop

    # Show the SQL generated by Hibernate in logs (useful for development).
    show-sql: true

    properties:
      hibernate:
        # Format multi-line SQL for readability.
        format_sql: true

  # ---------------------------------------------------------------------------
  # H2 in-memory database configuration
  # ---------------------------------------------------------------------------
  datasource:
    # H2 in-memory JDBC URL. Data lives only for the duration of the JVM process.
    url: jdbc:h2:mem:stockmarket;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 console — browser-based database inspector at /h2-console (dev only).
  h2:
    console:
      enabled: true
      path: /h2-console

  # ---------------------------------------------------------------------------
  # RSocket server configuration
  # ---------------------------------------------------------------------------
  rsocket:
    server:
      # TCP port on which the RSocket server listens.
      # Clients connect to this port using an RSocket requester.
      port: 7000

      # Use TCP transport (the default).
      # Alternative: "websocket" — for browser clients via a WebSocket transport.
      transport: tcp

# ---------------------------------------------------------------------------
# Spring Boot HTTP server port (Actuator endpoints).
# ---------------------------------------------------------------------------
server:
  port: 8080

# ---------------------------------------------------------------------------
# Spring Actuator — health and info endpoints
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        # Expose health and info for Docker health checks and monitoring.
        include: health,info
  endpoint:
    health:
      # Show full health details (component-level status) in the response.
      show-details: always

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
logging:
  level:
    com.example.rsocket: DEBUG
    org.springframework.messaging.rsocket: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
