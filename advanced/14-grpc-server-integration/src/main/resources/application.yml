# =============================================================================
# Application configuration for the gRPC Server Integration mini-project.
#
# Two servers are started when this application launches:
#   1. Spring Boot HTTP server — port 8080 (Actuator health/info endpoints).
#   2. gRPC server             — port 9090 (Netty, ProductCatalogService).
#
# The gRPC and HTTP ports are deliberately kept separate so that:
#   - The gRPC port can be firewalled for internal service-to-service traffic.
#   - The HTTP port can be exposed publicly for health checks and monitoring.
# =============================================================================

spring:

  application:
    # Application name shown in logs and Actuator /info.
    name: grpc-server-integration

  # ---------------------------------------------------------------------------
  # JPA / Hibernate configuration
  # ---------------------------------------------------------------------------
  jpa:
    # Hibernate DDL auto strategy:
    #   create-drop — drop and re-create the schema on startup/shutdown.
    #   Suitable for demos and tests. Use 'validate' or 'none' in production
    #   with a dedicated migration tool (Flyway/Liquibase).
    hibernate:
      ddl-auto: create-drop

    # Show the SQL generated by Hibernate in the logs.
    # Useful for development; disable in production to reduce log noise.
    show-sql: true

    # Format multi-line SQL statements for readability in logs.
    properties:
      hibernate:
        format_sql: true

  # ---------------------------------------------------------------------------
  # H2 in-memory database configuration
  # ---------------------------------------------------------------------------
  datasource:
    # H2 in-memory JDBC URL. The database lives only for the duration of the JVM process.
    url: jdbc:h2:mem:productcatalog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 console — web-based database inspector available at /h2-console (dev only).
  h2:
    console:
      enabled: true
      path: /h2-console

  # ---------------------------------------------------------------------------
  # Data initialization — seed the database with sample products on startup.
  # ---------------------------------------------------------------------------
  sql:
    init:
      mode: always

# ---------------------------------------------------------------------------
# Spring Boot HTTP server port (Actuator endpoints).
# Keep this separate from the gRPC port.
# ---------------------------------------------------------------------------
server:
  port: 8080

# ---------------------------------------------------------------------------
# gRPC server configuration (net.devh:grpc-server-spring-boot-starter)
# ---------------------------------------------------------------------------
grpc:
  server:
    # Port on which the Netty gRPC server listens.
    # Default is 9090. Clients connect to this port using a gRPC channel.
    port: 9090

    # Enable gRPC server reflection.
    # Reflection allows tools like grpcurl and Postman to discover service methods
    # without having a copy of the .proto file.
    # Disable in production to avoid exposing your API schema publicly.
    reflection:
      enabled: true

# ---------------------------------------------------------------------------
# Spring Actuator — health and info endpoints
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        # Expose health and info for Docker health checks and monitoring.
        include: health,info
  endpoint:
    health:
      # Show full health details (component-level status) in the response.
      show-details: always

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
logging:
  level:
    # Log gRPC server startup messages at DEBUG level for development visibility.
    net.devh.boot.grpc: DEBUG
    # Log Hibernate SQL parameter bindings (the actual values bound to ? placeholders).
    org.hibernate.type.descriptor.sql: TRACE
    com.example.grpc: DEBUG
