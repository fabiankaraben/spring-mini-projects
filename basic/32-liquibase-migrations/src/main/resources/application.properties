# Main application configuration
# ================================
#
# These values are used in the production environment (inside Docker).
# For tests, the file at src/test/resources/application.properties overrides these.

spring.application.name=liquibase-migrations

# -------------------------------------------------------------------
# DataSource — PostgreSQL
# The values below can be overridden by environment variables when
# running inside Docker Compose (see docker-compose.yml).
# -------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/liquibasedb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------------------------------------------------
# JPA / Hibernate
#
# IMPORTANT: use 'validate' (not 'create' or 'update') when Liquibase is
# in charge of the schema. Hibernate will only verify that the entity
# fields match the actual database columns; it will NOT alter the schema.
# Setting this to 'create' or 'update' would conflict with Liquibase.
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------------
# Liquibase
#
# Spring Boot auto-configures Liquibase when liquibase-core is on the
# classpath. The only thing we need to specify is the path to the
# master changelog file that orchestrates all migration steps.
# -------------------------------------------------------------------
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
