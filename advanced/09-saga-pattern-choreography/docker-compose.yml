# ============================================================================
# docker-compose.yml — Saga Pattern Choreography
# ============================================================================
# Starts the full system: Zookeeper, Kafka, three PostgreSQL databases,
# and the three microservices.
#
# Usage:
#   docker compose up --build        # build images and start everything
#   docker compose up -d             # start in detached mode
#   docker compose down -v           # stop and remove volumes
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Zookeeper — required by Kafka for cluster coordination (KRaft is not used
  # here to keep compatibility with the confluentinc images used by tests)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: saga-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Kafka broker
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: saga-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # PostgreSQL — Order Service database (port 5432)
  # --------------------------------------------------------------------------
  orderdb:
    image: postgres:16-alpine
    container_name: saga-orderdb
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
    ports:
      - "5432:5432"
    volumes:
      - orderdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # PostgreSQL — Payment Service database (port 5433)
  # --------------------------------------------------------------------------
  paymentdb:
    image: postgres:16-alpine
    container_name: saga-paymentdb
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
    ports:
      - "5433:5432"
    volumes:
      - paymentdb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # PostgreSQL — Inventory Service database (port 5434)
  # --------------------------------------------------------------------------
  inventorydb:
    image: postgres:16-alpine
    container_name: saga-inventorydb
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
    ports:
      - "5434:5432"
    volumes:
      - inventorydb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Order Service (port 8081)
  # --------------------------------------------------------------------------
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: saga-order-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://orderdb:5432/orderdb
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      orderdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Payment Service (port 8082)
  # --------------------------------------------------------------------------
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: saga-payment-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://paymentdb:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      paymentdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Inventory Service (port 8083)
  # --------------------------------------------------------------------------
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: saga-inventory-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventorydb:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: saga
      SPRING_DATASOURCE_PASSWORD: saga
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      inventorydb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# --------------------------------------------------------------------------
# Named volumes for database persistence
# --------------------------------------------------------------------------
volumes:
  orderdb-data:
  paymentdb-data:
  inventorydb-data:
