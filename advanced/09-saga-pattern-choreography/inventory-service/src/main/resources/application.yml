# ============================================================================
# Inventory Service — application configuration
# ============================================================================

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5434/inventorydb
    username: saga
    password: saga
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info
