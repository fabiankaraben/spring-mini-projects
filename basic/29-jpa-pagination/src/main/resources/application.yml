spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pagination_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update # Automatically update DB schema (useful in this educational setup)
    show-sql: true # Show SQL queries in the console for educational purposes
    properties:
      hibernate:
        format_sql: true # Format SQL to be more readable
