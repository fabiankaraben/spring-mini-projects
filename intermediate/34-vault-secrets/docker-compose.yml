services:
  # HashiCorp Vault — secrets management server
  #
  # Running in "dev" mode for this demo:
  # - Pre-unsealed (no unseal key ceremony needed)
  # - KV v2 secrets engine pre-mounted at "secret/"
  # - All data stored in memory (no persistence between restarts)
  # - Root token is set to VAULT_DEV_ROOT_TOKEN_ID below
  #
  # For a production deployment you would use a non-dev Vault with a persistent
  # storage backend (e.g. Consul, PostgreSQL, Raft integrated storage), TLS,
  # and a proper token/auth policy strategy.
  vault:
    image: hashicorp/vault:1.17
    container_name: vault-secrets-vault
    ports:
      # Vault API port: used by the Spring Boot app and the vault CLI
      - "8200:8200"
    environment:
      # Root token for the dev server.
      # In dev mode this becomes the initial root token.
      # Change this to a stronger value in real environments.
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      # The address Vault listens on inside the container
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      # IPC_LOCK is recommended by HashiCorp to prevent Vault memory from
      # being swapped to disk (which would expose secrets in the swap file)
      - IPC_LOCK
    healthcheck:
      # Use vault's built-in status command to check readiness
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Spring Boot application
  app:
    build: .
    container_name: vault-secrets-app
    ports:
      - "8080:8080"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      # Override application.yml to point to the "vault" service via Docker DNS
      # Docker Compose's internal DNS resolves "vault" to the container's IP
      - SPRING_CLOUD_VAULT_HOST=vault
      - SPRING_CLOUD_VAULT_PORT=8200
      - SPRING_CLOUD_VAULT_SCHEME=http
      - SPRING_CLOUD_VAULT_TOKEN=root-token
      - SPRING_CLOUD_VAULT_KV_ENABLED=true
      - SPRING_CLOUD_VAULT_KV_BACKEND=secret
