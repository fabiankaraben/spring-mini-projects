server.port=8888
spring.application.name=configuration-server

# Use the 'native' profile to load configuration from the classpath/filesystem
# instead of a Git repository (which is the default).
spring.profiles.active=native

# Location of the configuration files to be served.
# 'classpath:/config' refers to the src/main/resources/config directory.
spring.cloud.config.server.native.search-locations=classpath:/config
