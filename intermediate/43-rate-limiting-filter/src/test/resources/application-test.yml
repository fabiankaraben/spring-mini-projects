spring:
  # ── Redis connection ─────────────────────────────────────────────────────────
  # The host and port are overridden at runtime by @DynamicPropertySource in the
  # integration test class. Testcontainers assigns a random host port, so these
  # placeholder values are never actually used when running tests.
  data:
    redis:
      host: localhost
      port: 6379

# ── Rate limiter configuration for tests ──────────────────────────────────────
app:
  rate-limit:
    # Small capacity to make it easy to exhaust the bucket in tests
    capacity: 5
    # Short refill window so tests do not have to wait too long
    refill-period-seconds: 60
    key-prefix: "test_rate_limit:"
