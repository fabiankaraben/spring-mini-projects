## Docker Java client configuration for Testcontainers
##
## Problem: docker-java defaults to API version v1.24, but Docker Desktop 29+
## returns HTTP 400 for the legacy /v1.24/info path. This file overrides the
## API version to v1.44 which Docker Desktop 29+ accepts.
##
## This file is automatically read by the docker-java client when it is present
## on the classpath (src/test/resources is on the test classpath).
api.version=1.44
