services:
  # ── Spring Boot application ──────────────────────────────────────────────────
  app:
    build: .
    container_name: barcodegenerator-app
    ports:
      # Map host port 8080 to the container's port 8080.
      # Change the host port (left side) if 8080 is already in use on your machine.
      - "8080:8080"
    environment:
      # Override the server port inside the container if needed
      - SERVER_PORT=8080
