spring.application.name=formlogin

# ── PostgreSQL DataSource ─────────────────────────────────────────────────────
# When running via Docker Compose, "db" resolves to the postgres service name.
# When running locally, change this to localhost:5432.
spring.datasource.url=jdbc:postgresql://db:5432/formlogindb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Hibernate / JPA ───────────────────────────────────────────────────────────
# "update" creates or updates the schema automatically – fine for demos.
# In production, use Flyway or Liquibase for controlled migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
# Cache is disabled so template changes are reflected immediately during development.
# Set to true in production for performance.
spring.thymeleaf.cache=false
