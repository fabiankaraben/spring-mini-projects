spring:
  # ── DataSource ──────────────────────────────────────────────────────────────
  # The URL, username, and password are overridden at runtime by
  # @DynamicPropertySource in the integration test class. Testcontainers assigns
  # a random host port to the container, so we cannot hard-code the URL here.
  # These values act as placeholders and are never actually used in tests.
  datasource:
    url: jdbc:postgresql://localhost:5432/test_placeholder
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    # create-drop: create the schema at context startup and drop it at shutdown.
    # This ensures each test run starts with a clean, consistent database state.
    hibernate:
      ddl-auto: create-drop
    # Suppress SQL logging in tests to keep the test output readable
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── Application-specific JWT settings ─────────────────────────────────────────
app:
  jwt:
    # Use a fixed, well-known secret in tests so JWTs are reproducible and
    # tokens generated in one test can be verified in another.
    secret: "TestSecretKeyForJWTValidationMiniProjectTesting!2024xx"
    # Short expiration used in some tests; individual tests may override via
    # direct JwtService instantiation with a different configuration.
    expiration-seconds: 3600
