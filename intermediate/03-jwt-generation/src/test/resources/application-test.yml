spring:
  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    # create-drop recreates the schema on every test run, giving each test
    # suite a clean database state.
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── JWT settings for tests ───────────────────────────────────────────────────
app:
  jwt:
    # Use a dedicated test secret so production secrets are never used in tests
    secret: "TestSecretKeyForJWTGenerationMiniProjectTests2024!"
    # Short expiry for integration tests (still 1 hour; adjust if needed)
    expiration-seconds: 3600
