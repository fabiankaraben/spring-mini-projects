# Application Name Configuration
spring.application.name=actuator-info-endpoint

# ===================================================================
# ACTUATOR ENDPOINT CONFIGURATION
# ===================================================================

# Expose the /actuator/info endpoint over HTTP (by default only /health is exposed)
management.endpoints.web.exposure.include=health,info

# ===================================================================
# STANDARD INFO PROPERTIES (Loaded automatically by EnvironmentInfoContributor)
# ===================================================================

# These properties will be exposed automatically under 'app' in the /actuator/info response
info.app.name=${spring.application.name}
info.app.description=A Spring Boot application demonstrating standard and custom info metrics via Actuator
info.app.version=1.0.0
info.app.environment=development
info.app.team=backend-team

# ===================================================================
# ADDITIONAL BUILT-IN INFO CONTRIBUTORS
# ===================================================================

# Enable OS information in the /actuator/info endpoint
management.info.os.enabled=true

# Enable Java runtime information in the /actuator/info endpoint
management.info.java.enabled=true

# Note: EnvironmentInfoContributor is enabled by default.
management.info.env.enabled=true
