spring:
  application:
    name: testcontainers-postgres

  # ---------------------------------------------------------------------------
  # DataSource configuration
  #
  # Default values target a local PostgreSQL instance started via docker-compose.yml.
  # When running inside Docker Compose (the full stack), these values are overridden
  # by the environment variables defined in docker-compose.yml:
  #   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  #
  # During integration tests, Testcontainers overrides these properties dynamically
  # via @DynamicPropertySource — so the test database URL/port is set at runtime,
  # not here.
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/productsdb
    username: products_user
    password: products_pass
    driver-class-name: org.postgresql.Driver

  # ---------------------------------------------------------------------------
  # JPA / Hibernate configuration
  # ---------------------------------------------------------------------------
  jpa:
    # 'update' — Hibernate auto-creates/updates tables to match entities on startup.
    # Fine for development and demos. For production, prefer Flyway or Liquibase.
    hibernate:
      ddl-auto: update
    # Log the SQL Hibernate generates — educational: shows INSERT/SELECT/UPDATE/DELETE
    show-sql: true
    properties:
      hibernate:
        # Pretty-print the SQL for easier reading in the console
        format_sql: true
        # Explicit PostgreSQL dialect avoids auto-detection overhead at startup
        dialect: org.hibernate.dialect.PostgreSQLDialect

# REST API port
server:
  port: 8080

# Pretty-print JSON responses — helpful for learning and debugging
spring.jackson.serialization.indent_output: true
