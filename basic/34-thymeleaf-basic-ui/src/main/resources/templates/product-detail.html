<!DOCTYPE html>
<!--
    Product detail page template.

    This template demonstrates:
      - Rendering a single model object's fields (th:text)
      - Conditional rendering (th:if / th:unless)
      - Thymeleaf link expressions (th:href with @{...})
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--
        The page title is built dynamically by concatenating a literal string
        with the product name from the model.
        Syntax: 'literal text' + ${expression}
    -->
    <title th:text="${product.name} + ' | Thymeleaf Basic UI'">Product Detail</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        nav {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav .brand {
            color: #e94560;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #fff;
        }

        .container {
            max-width: 700px;
            margin: 2.5rem auto;
            padding: 0 1rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #e94560;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link:hover {
            color: #b5001f;
        }

        .detail-card {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .detail-card .category {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #e94560;
            margin-bottom: 0.5rem;
        }

        .detail-card h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 1.25rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
        }

        .detail-value {
            font-size: 1.1rem;
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .badge {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
        }

        .badge-in-stock {
            background: #d4edda;
            color: #155724;
        }

        .badge-out-stock {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <nav>
        <a class="brand" th:href="@{/}">🛍️ Product Catalog</a>
        <div>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/products/in-stock}">In Stock</a>
        </div>
    </nav>

    <div class="container">

        <!-- Back navigation link -->
        <a class="back-link" th:href="@{/}">← Back to catalog</a>

        <div class="detail-card">

            <!-- Product category label -->
            <div class="category" th:text="${product.category}">Category</div>

            <!-- Product name as the main heading -->
            <h1 th:text="${product.name}">Product Name</h1>

            <!-- ID row -->
            <div class="detail-row">
                <span class="detail-label">ID</span>
                <!--
                The '#' prefix in ${product.id()} is NOT used here because 'product'
                is a Java record; Thymeleaf accesses record components via their
                accessor method names, which match the field names directly.
            -->
                <span class="detail-value" th:text="${product.id}">0</span>
            </div>

            <!-- Price row -->
            <div class="detail-row">
                <span class="detail-label">Price</span>
                <span class="price-value" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</span>
            </div>

            <!-- Availability row -->
            <div class="detail-row">
                <span class="detail-label">Availability</span>
                <!--
                th:if and th:unless produce mutually exclusive output:
                only one badge will appear in the rendered HTML.
            -->
                <span class="badge badge-in-stock" th:if="${product.inStock}">✔ In Stock</span>
                <span class="badge badge-out-stock" th:unless="${product.inStock}">✖ Out of Stock</span>
            </div>

        </div>
    </div>

</body>

</html>
