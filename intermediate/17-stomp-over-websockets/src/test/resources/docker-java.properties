# docker-java client configuration loaded from the classpath at test runtime.
#
# api.version – overrides the docker-java default API version (v1.24).
# Docker Desktop 29+ returns HTTP 400 for requests using v1.24 because it
# dropped support for that legacy API version. Setting api.version to 1.44
# ensures docker-java uses a version that Docker Desktop accepts, which allows
# Testcontainers to successfully validate the Docker environment during startup.
api.version=1.44
