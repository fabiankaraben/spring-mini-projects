# =============================================================================
# Logstash pipeline configuration for the Elastic Stack Logging mini-project
#
# Pipeline: Filebeat → Logstash → Elasticsearch
#
# This pipeline:
#   1. INPUT:  Receives JSON log events from Filebeat on port 5044 (Beats protocol).
#   2. FILTER: Parses the JSON body, renames/cleans fields, and adds metadata.
#   3. OUTPUT: Sends processed events to Elasticsearch for indexing.
#
# Why Logstash in the middle?
#   - Filebeat is lightweight (written in Go) and designed for log shipping only.
#   - Logstash provides a powerful transformation layer (grok, mutate, date, etc.).
#   - Having Logstash between Filebeat and Elasticsearch allows enrichment,
#     field renaming, and routing to different indices without changing app code.
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT: Beats protocol listener
#
# Listens on port 5044 for incoming Beats events (Filebeat uses Beats protocol).
# Filebeat sends compressed, batched log lines with metadata such as:
#   - message: the raw log line (our JSON string)
#   - log.file.path: absolute path of the source file on the host
#   - host.name: hostname of the machine running Filebeat
# -----------------------------------------------------------------------------
input {
  beats {
    port => 5044
  }
}

# -----------------------------------------------------------------------------
# FILTER: Parse and enrich log events
#
# Since the Spring Boot app writes JSON log lines (via logstash-logback-encoder),
# the "message" field already contains a complete JSON object. We use the
# json filter to parse it and promote all nested fields to top-level fields.
# -----------------------------------------------------------------------------
filter {

  # ---------------------------------------------------------------------------
  # json filter: parse the "message" field as JSON
  #
  # logstash-logback-encoder writes each log line as a JSON object like:
  #   {"@timestamp":"...","message":"Order created","orderId":"abc","level":"INFO",...}
  #
  # The json filter parses this string and merges its keys into the event.
  # After this filter, "orderId", "level", "application", etc. are top-level
  # fields that Kibana can index and search on directly.
  #
  # source => "message"  — the field to parse
  # target => "log"      — put parsed fields under a "log" namespace to avoid
  #                        collisions with Logstash's own reserved field names.
  #                        We then promote the fields we care about below.
  # ---------------------------------------------------------------------------
  json {
    source => "message"
    target => "parsed_log"
    # If JSON parsing fails (e.g., a non-JSON line), add a tag so we can
    # identify malformed events in Kibana.
    tag_on_failure => ["_jsonparsefailure"]
  }

  # ---------------------------------------------------------------------------
  # mutate filter: promote important fields from the parsed JSON to top level
  #
  # This makes orderId, customerId, level, etc. available as first-class
  # Elasticsearch fields, enabling efficient filtering and aggregation in Kibana.
  # ---------------------------------------------------------------------------
  if [parsed_log] {
    mutate {
      # Copy the structured fields out of the parsed_log namespace
      add_field => {
        "app_timestamp"  => "%{[parsed_log][@timestamp]}"
        "log_level"      => "%{[parsed_log][level]}"
        "log_message"    => "%{[parsed_log][message]}"
        "application"    => "%{[parsed_log][application]}"
        "logger_name"    => "%{[parsed_log][logger_name]}"
        "thread_name"    => "%{[parsed_log][thread_name]}"
      }
    }

    # Promote optional structured fields only if they exist in the log event
    # (not all log events will have orderId, customerId, requestId, etc.)
    if [parsed_log][orderId] {
      mutate { add_field => { "orderId" => "%{[parsed_log][orderId]}" } }
    }
    if [parsed_log][customerId] {
      mutate { add_field => { "customerId" => "%{[parsed_log][customerId]}" } }
    }
    if [parsed_log][requestId] {
      mutate { add_field => { "requestId" => "%{[parsed_log][requestId]}" } }
    }
    if [parsed_log][httpStatus] {
      mutate { add_field => { "httpStatus" => "%{[parsed_log][httpStatus]}" } }
    }
    if [parsed_log][errorType] {
      mutate { add_field => { "errorType" => "%{[parsed_log][errorType]}" } }
    }

    # Remove the intermediate parsed_log object now that we've promoted the fields
    mutate {
      remove_field => ["parsed_log"]
    }
  }

  # ---------------------------------------------------------------------------
  # date filter: use the application's @timestamp as the event timestamp
  #
  # Logstash assigns its own @timestamp by default (when it received the event).
  # We override it with the application's original timestamp so that Kibana
  # shows the time the log was emitted, not the time it was processed.
  # ---------------------------------------------------------------------------
  if [app_timestamp] and [app_timestamp] != "%{[parsed_log][@timestamp]}" {
    date {
      match => ["app_timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

# -----------------------------------------------------------------------------
# OUTPUT: Send events to Elasticsearch
#
# index: writes to a daily index (e.g., "app-logs-2024.01.15").
#   - Daily rotation prevents any single index from growing unbounded.
#   - The date suffix lets Kibana create index lifecycle management (ILM) policies.
#
# In production you would also configure:
#   - index lifecycle management (ILM) to auto-delete old indices
#   - index templates to control field mappings and settings
# -----------------------------------------------------------------------------
output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS}"]
    # Daily index rotation: app-logs-2024.01.15, app-logs-2024.01.16, ...
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  # Uncomment to also print events to the Logstash console (useful for debugging)
  # stdout { codec => rubydebug }
}
