# ── Integration-test Spring profile ──────────────────────────────────────────
# This profile is activated by @ActiveProfiles("integration-test") on the
# integration test classes.  It overrides the default application.yml values
# with settings appropriate for the Testcontainers PostgreSQL instance.
#
# The actual JDBC URL, username, and password are injected at runtime by
# @DynamicPropertySource in the test class, so the values here are just
# placeholders that get overridden before the Spring context starts.

spring:
  # Flyway must run so that Quartz tables and job_audit_log are created in the
  # test database container before the scheduler tries to use them.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      # "validate" is safe – Flyway creates the schema; Hibernate just checks it matches
      ddl-auto: validate
    # Show SQL during integration tests to help debug failures
    show-sql: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: QuartzTestScheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            isClustered: false
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            # Use 2 threads in tests to keep resource usage low
            threadCount: 2
            threadPriority: 5

logging:
  level:
    com.example.quartzscheduler: DEBUG
    org.quartz: WARN
    org.flywaydb: INFO
