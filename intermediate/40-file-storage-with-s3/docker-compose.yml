services:

  # ─────────────────────────────────────────────────────────────────────────
  # MinIO – S3-compatible object storage server
  # ─────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: filestorage-minio
    # The 'server /data' command starts MinIO in server mode with /data as the storage path.
    # The '--console-address' flag enables the MinIO web console on port 9001.
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API endpoint (used by the Spring Boot app)
      - "9001:9001"   # MinIO Web Console (accessible in the browser)
    environment:
      # Root credentials – match the values in application.yml
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      # Persist uploaded files across container restarts
      - minio_data:/data
    healthcheck:
      # Use the MinIO health endpoint to wait until the server is ready
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Spring Boot application
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: filestorage-app
    ports:
      - "8080:8080"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # Override application.yml values to point at the MinIO container
      # 'minio' is the Docker Compose service name, which is the internal hostname
      APP_S3_ENDPOINT_URL: http://minio:9000
      APP_S3_REGION: us-east-1
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_BUCKET_NAME: file-storage-bucket
      APP_S3_PATH_STYLE_ACCESS: "true"

volumes:
  # Named volume for MinIO data persistence
  minio_data:
