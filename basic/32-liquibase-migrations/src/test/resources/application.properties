# Test application configuration
# ================================
#
# This file is loaded automatically when Spring Boot tests run.
# It OVERRIDES the main application.properties found in src/main/resources.
#
# We use an H2 in-memory database so tests can run without a real PostgreSQL
# instance. H2's PostgreSQL compatibility mode makes the SQL syntax close
# enough that the same Liquibase changelogs work in both environments.

spring.application.name=liquibase-migrations-test

# -------------------------------------------------------------------
# H2 in-memory DataSource
#
# MODE=PostgreSQL makes H2 understand PostgreSQL SQL dialect (important
# because Liquibase's XML tags may generate PostgreSQL-flavoured SQL).
# DB_CLOSE_DELAY=-1 keeps the database alive for the entire test run.
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -------------------------------------------------------------------
# JPA / Hibernate
# Keep 'validate' so Hibernate checks the schema that Liquibase built.
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# -------------------------------------------------------------------
# Liquibase
# Liquibase runs its changelogs against the H2 test database before
# each test class. This means tests see the same schema as production.
# -------------------------------------------------------------------
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
