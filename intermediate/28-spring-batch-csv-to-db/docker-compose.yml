services:
  # ── PostgreSQL – application database ────────────────────────────────────────
  # Stores both the imported employee records and the Spring Batch meta-data
  # tables (BATCH_JOB_INSTANCE, BATCH_JOB_EXECUTION, etc.).
  #
  # Flyway runs on application startup and applies two migration scripts:
  #   V1__create_employees_table.sql    – creates the employees table
  #   V2__create_spring_batch_tables.sql – creates Spring Batch meta-data tables
  postgres:
    image: postgres:16-alpine
    container_name: batch-csv-to-db-postgres
    ports:
      # Expose port 5432 on the host so you can inspect data with psql or a GUI tool:
      # psql -h localhost -p 5432 -U batch -d batchdb
      - "5432:5432"
    environment:
      # Database credentials – must match SPRING_DATASOURCE_* in the app service below
      POSTGRES_DB: batchdb
      POSTGRES_USER: batch
      POSTGRES_PASSWORD: batch
    volumes:
      # Named volume persists database data across container restarts.
      # Remove it to start fresh: docker volume rm 28-spring-batch-csv-to-db_pgdata
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready exits 0 when PostgreSQL is ready to accept connections.
      # The app service waits for this check to pass before starting.
      test: ["CMD-SHELL", "pg_isready -U batch -d batchdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Spring Boot application ───────────────────────────────────────────────────
  # The Spring Batch CSV-to-DB application. It reads a CSV file from /data/
  # (bind-mounted from the host) and exposes a REST API on port 8080.
  app:
    build: .
    container_name: batch-csv-to-db-app
    ports:
      # Access the API at: http://localhost:8080
      - "8080:8080"
    environment:
      # ── DataSource – uses the postgres service name as the hostname ──────────
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/batchdb
      SPRING_DATASOURCE_USERNAME: batch
      SPRING_DATASOURCE_PASSWORD: batch
      # ── JPA ─────────────────────────────────────────────────────────────────
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # ── Spring Batch ─────────────────────────────────────────────────────────
      # Flyway creates the Spring Batch tables – tell Spring Batch not to re-init
      SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: never
      # Disable auto-run on startup; jobs are triggered via POST /api/batch/jobs/import-employees
      SPRING_BATCH_JOB_ENABLED: "false"
      # ── CSV file path ────────────────────────────────────────────────────────
      # Points to the bind-mounted /data directory. Place your employees.csv
      # file in the ./data/ directory on the host before running the job.
      BATCH_CSV_FILE_PATH: "file:/data/employees.csv"
    volumes:
      # Bind-mount the host ./data directory into the container's /data directory.
      # Place (or replace) employees.csv here without rebuilding the image.
      - ./data:/data
    depends_on:
      postgres:
        # Wait for the PostgreSQL healthcheck to pass before starting the app
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Named volume for PostgreSQL data persistence
  pgdata:
