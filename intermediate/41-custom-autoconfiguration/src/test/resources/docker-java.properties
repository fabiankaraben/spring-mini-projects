# =============================================================================
# docker-java client configuration
#
# Overrides the default Docker API version used by docker-java (and therefore
# by Testcontainers). Docker Desktop 29+ rejects requests to the legacy
# /v1.24/ API path with HTTP 400. Setting api.version=1.44 ensures all
# docker-java calls target a supported API version.
#
# Without this file, Testcontainers would fail at the container startup
# strategy check with: "java.io.IOException: java.util.concurrent.ExecutionException"
# =============================================================================
api.version=1.44
